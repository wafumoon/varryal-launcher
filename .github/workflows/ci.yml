name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  # ── Java bridge ────────────────────────────────────────────────────────────
  bridge:
    name: Bridge (Java 21 / Gradle)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: temurin
          cache: gradle
      - name: Build bridge module
        working-directory: bridge
        run: gradle build --no-daemon

  # ── React UI ───────────────────────────────────────────────────────────────
  ui:
    name: UI (Node / pnpm)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: pnpm
          cache-dependency-path: apps/ui/pnpm-lock.yaml
      - name: Install dependencies
        working-directory: apps/ui
        run: pnpm install --frozen-lockfile
      - name: Build UI
        working-directory: apps/ui
        run: pnpm build

  # ── Tauri shell — cargo check (fast gate, all platforms) ──────────────────
  # Runs before the expensive tauri build to catch Rust errors quickly.
  # Windows uses the MSVC toolchain (link.exe pre-installed on windows-latest).
  # macOS and Linux use the stable toolchain for their host.
  shell-check:
    name: Shell cargo check (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            toolchain: stable-x86_64-pc-windows-msvc
          - os: macos-latest
            toolchain: stable
          - os: ubuntu-latest
            toolchain: stable
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust (${{ matrix.toolchain }})
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ matrix.toolchain }}

      - name: Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: apps/shell/src-tauri -> target

      - name: Install Linux system deps
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.1-dev \
            libappindicator3-dev librsvg2-dev patchelf

      - name: cargo check
        working-directory: apps/shell/src-tauri
        run: cargo check
        # DENY_WARNINGS ensures #![deny(warnings)] in main.rs is enforced.
        # RUSTFLAGS is set explicitly so CI treats warnings as errors even if
        # the attribute is ever removed from source.
        env:
          RUSTFLAGS: "-D warnings"

  # ── Tauri shell — full build (all platforms) ──────────────────────────────
  tauri:
    name: Tauri shell (${{ matrix.os }})
    needs: [bridge, ui, shell-check]
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            toolchain: stable-x86_64-pc-windows-msvc
          - os: macos-latest
            toolchain: stable
          - os: ubuntu-latest
            toolchain: stable
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: pnpm
          cache-dependency-path: apps/ui/pnpm-lock.yaml

      - name: Install Rust (${{ matrix.toolchain }})
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ matrix.toolchain }}

      - name: Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: apps/shell/src-tauri -> target

      - name: Install Linux system deps
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.1-dev \
            libappindicator3-dev librsvg2-dev patchelf

      - name: Install UI deps
        working-directory: apps/ui
        run: pnpm install --frozen-lockfile

      - name: Build UI
        working-directory: apps/ui
        run: pnpm build

      - name: Tauri build
        working-directory: apps/shell
        run: pnpm tauri build
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: varryal-${{ matrix.os }}
          path: |
            apps/shell/src-tauri/target/release/bundle/**/*.exe
            apps/shell/src-tauri/target/release/bundle/**/*.msi
            apps/shell/src-tauri/target/release/bundle/**/*.dmg
            apps/shell/src-tauri/target/release/bundle/**/*.AppImage
            apps/shell/src-tauri/target/release/bundle/**/*.deb
